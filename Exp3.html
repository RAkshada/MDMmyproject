<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Product</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Hero Section -->
<div class="container text-center py-5">
    <h1>My Product</h1>
    <p class="lead">Amazing solution for modern problems</p>
</div>

<!-- Product Section -->
<div class="container py-5">
    <div class="row text-center">

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Product 1</h4>
                <p>Description of product 1</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Product 2</h4>
                <p>Description of product 2</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Product 3</h4>
                <p>Description of product 3</p>
            </div>
        </div>

    </div>
</div>

<!-- Pricing Section -->
<div class="container py-5 text-center">
    <h2>Pricing</h2>
    <div class="row">

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Basic</h3>
                <p>₹199/month</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Pro</h3>
                <p>₹499/month</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h3>Premium</h3>
                <p>₹999/month</p>
            </div>
        </div>

    </div>
</div>

<!-- Contact Form -->
<div class="container py-5">
    <h2>Contact Us</h2>

    <form>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Your Name" required>
        </div>

        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Your Email" required>
        </div>

        <div class="mb-3">
            <textarea class="form-control" rows="4" placeholder="Your Message" required></textarea>
        </div>

        <button class="btn btn-primary">Submit</button>
    </form>
</div>

</body>
</html>
